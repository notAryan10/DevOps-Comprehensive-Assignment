services:
  mongo:
    image: mongo:7
    container_name: mongo_container
    volumes:
      - mongo_data:/data/db

  app:
    image: node:20
    container_name: app_container
    working_dir: /app/backend
    volumes:
      - .:/app
    command: sh -c "npm install && node server.js"
    ports:
      - "80:5000"
    depends_on:
      - mongo
    environment:
      - MONGO_URI=${MONGO_URI}

volumes:
  mongo_data: